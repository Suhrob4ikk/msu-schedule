<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>МГУ — Нет соединения</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: #1e293b;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f1f5f9;
    }

    p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto 32px;
    }

    button {
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Нет соединения</h1>
  <p>
    Расписание недоступно — проверь подключение к интернету и попробуй снова.
  </p>
  <button onclick="location.reload()">Попробовать снова</button>
  <p class="hint">
    Если открывал расписание раньше — оно могло сохраниться в кеше.<br>
    Вернись назад или открой приложение заново.
  </p>

  <script>
    // Автоматически перезагружаем страницу когда появляется интернет
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
